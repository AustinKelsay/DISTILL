<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distill</title>
    <style>
      :root {
        --bg: #1a1a1e;
        --panel: #222226;
        --ink: #e4e2de;
        --muted: #9a9590;
        --dim: #6a6560;
        --line: #3a3a3e;
        --accent: #3dbf9a;
        --warn: #d4944a;
        --ok-bg: #1a332b;
        --miss-bg: #332418;
        --card: rgba(34, 34, 38, 0.85);
        --card-border: rgba(58, 58, 62, 0.9);
        --mono: "Menlo", "Monaco", "Consolas", monospace;
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
        font-size: 13px;
        color: var(--ink);
        background: linear-gradient(180deg, #1e1e22 0%, var(--bg) 100%);
      }

      /* ── Top bar ── */
      .topbar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(30, 30, 34, 0.92);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .topbar-brand {
        font-weight: 700;
        font-size: 15px;
        color: var(--accent);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-family: var(--mono);
      }

      .topbar-view-switch {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--card-border);
        border-radius: 10px;
        background: var(--card);
      }

      .view-tab {
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 7px 12px;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-family: var(--mono);
        font-size: 12px;
        cursor: pointer;
        min-height: 32px;
        transition: background 100ms, color 100ms, border-color 100ms;
      }

      .view-tab:hover {
        color: var(--ink);
        background: rgba(61, 191, 154, 0.08);
      }

      .view-tab.active {
        color: var(--accent);
        background: rgba(61, 191, 154, 0.14);
        border-color: rgba(61, 191, 154, 0.22);
      }

      .topbar-search {
        flex: 1;
        max-width: 480px;
        padding: 7px 12px;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 13px;
      }

      .topbar-search.is-hidden {
        display: none;
      }

      .topbar-search:focus {
        outline: 2px solid rgba(61, 191, 154, 0.25);
        border-color: rgba(61, 191, 154, 0.45);
      }

      .topbar-stats {
        display: flex;
        gap: 16px;
        margin-left: auto;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
      }

      .topbar-stats .stat-value {
        color: var(--ink);
        font-weight: 600;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .topbar-sync {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        padding: 0;
        background: none;
        border: none;
        border-radius: 0;
        white-space: nowrap;
      }

      .topbar-sync[data-state="running"] {
        color: var(--warn);
        border-color: rgba(212, 148, 74, 0.35);
      }

      .topbar-sync[data-state="queued"] {
        color: var(--warn);
        border-color: rgba(212, 148, 74, 0.35);
      }

      .topbar-sync[data-state="completed"] {
        color: var(--accent);
        border-color: rgba(61, 191, 154, 0.35);
      }

      .topbar-sync[data-state="warning"] {
        color: var(--warn);
        border-color: rgba(212, 148, 74, 0.35);
      }

      .topbar-sync[data-state="failed"] {
        color: #d46a4a;
        border-color: rgba(212, 106, 74, 0.35);
      }

      .btn {
        border: 1px solid var(--card-border);
        border-radius: 8px;
        padding: 8px 16px;
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        font-family: var(--mono);
        white-space: nowrap;
        min-height: 36px;
        transition: border-color 100ms, background 100ms;
      }

      .btn:hover { border-color: rgba(61, 191, 154, 0.3); }
      .btn:active { background: var(--ok-bg); }

      .btn-secondary:hover {
        border-color: rgba(61, 191, 154, 0.4);
        background: rgba(61, 191, 154, 0.08);
      }

      .btn-primary {
        border: 1px solid rgba(61, 191, 154, 0.4);
        border-radius: 8px;
        padding: 8px 18px;
        background: rgba(61, 191, 154, 0.15);
        color: var(--accent);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: var(--mono);
        white-space: nowrap;
        min-height: 36px;
        transition: border-color 100ms, background 100ms;
      }

      .btn-primary:hover {
        background: rgba(61, 191, 154, 0.22);
        border-color: rgba(61, 191, 154, 0.55);
      }

      .btn-primary:active {
        background: rgba(61, 191, 154, 0.3);
      }

      .btn-ghost {
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 8px 14px;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        font-family: var(--mono);
        white-space: nowrap;
        min-height: 36px;
        transition: color 100ms, background 100ms, border-color 100ms;
      }

      .btn-ghost:hover {
        color: var(--ink);
        background: rgba(61, 191, 154, 0.08);
        border-color: rgba(61, 191, 154, 0.15);
      }

      .btn-ghost:active {
        background: rgba(61, 191, 154, 0.14);
      }

      .btn-primary:disabled,
      .btn:disabled,
      .btn-ghost:disabled {
        opacity: 0.4;
        cursor: default;
        pointer-events: none;
      }

      .help-tip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 1px solid rgba(61, 191, 154, 0.26);
        background: rgba(61, 191, 154, 0.08);
        color: var(--accent);
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1;
        cursor: pointer;
        vertical-align: middle;
        margin-left: 4px;
        flex-shrink: 0;
      }

      .help-tip:hover {
        background: rgba(61, 191, 154, 0.14);
        border-color: rgba(61, 191, 154, 0.45);
      }

      /* Tooltip: single floating element positioned by JS */
      .tooltip-float {
        position: fixed;
        max-width: 300px;
        min-width: 120px;
        padding: 8px 12px;
        border-radius: 8px;
        background: rgba(18, 18, 22, 0.97);
        border: 1px solid rgba(61, 191, 154, 0.26);
        color: var(--ink);
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.45;
        white-space: normal;
        text-transform: none;
        letter-spacing: normal;
        pointer-events: none;
        z-index: 300;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        opacity: 0;
        visibility: hidden;
        transition: opacity 120ms, visibility 0s linear 120ms;
      }

      .tooltip-float.visible {
        opacity: 1;
        visibility: visible;
        transition-delay: 0s;
      }

      /* Help popover: shown on click, dismisses on click-away */
      .help-popover {
        position: fixed;
        max-width: 320px;
        min-width: 160px;
        padding: 12px 16px;
        border-radius: 10px;
        background: rgba(22, 22, 26, 0.98);
        border: 1px solid rgba(61, 191, 154, 0.3);
        color: var(--ink);
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.55;
        white-space: normal;
        text-transform: none;
        letter-spacing: normal;
        z-index: 300;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        opacity: 0;
        visibility: hidden;
        transition: opacity 120ms, visibility 0s linear 120ms;
      }

      .help-popover.visible {
        opacity: 1;
        visibility: visible;
        transition-delay: 0s;
      }

      .help-popover-title {
        font-size: 11px;
        font-weight: 600;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 6px;
      }

      /* ── Topbar sync group ── */
      .topbar-sync-group {
        display: flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--card-border);
        border-radius: 10px;
        padding: 2px 4px 2px 10px;
        background: var(--card);
      }

      /* ── Dropdown ── */
      .dropdown {
        position: relative;
        display: inline-block;
      }

      .dropdown-menu {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        right: 0;
        min-width: 200px;
        background: rgba(22, 22, 26, 0.98);
        border: 1px solid var(--card-border);
        border-radius: 10px;
        padding: 6px 0;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        z-index: 50;
      }

      .dropdown-menu.visible {
        display: block;
      }

      .dropdown-item {
        display: block;
        width: 100%;
        padding: 10px 16px;
        background: none;
        border: none;
        color: var(--ink);
        font: inherit;
        font-family: var(--mono);
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        transition: background 80ms;
      }

      .dropdown-item:hover {
        background: rgba(61, 191, 154, 0.1);
      }

      .is-hidden {
        display: none !important;
      }

      /* ── Tag chips ── */
      .tag-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--card-border);
        border-radius: 999px;
        padding: 5px 8px 5px 12px;
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 12px;
        font-family: var(--mono);
        min-height: 30px;
      }

      .tag-remove {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: rgba(58, 58, 62, 0.5);
        color: var(--muted);
        font-size: 11px;
        cursor: pointer;
        border: none;
        font-family: var(--mono);
        transition: background 100ms, color 100ms;
      }

      .tag-remove:hover {
        background: rgba(212, 106, 74, 0.2);
        color: #d46a4a;
      }

      /* ── Focus-visible ── */
      .btn:focus-visible,
      .btn-ghost:focus-visible,
      .btn-primary:focus-visible,
      .chip:focus-visible,
      .help-tip:focus-visible,
      .dropdown-item:focus-visible,
      .tag-remove:focus-visible,
      .logs-search-input:focus-visible,
      .view-tab:focus-visible {
        outline: 2px solid rgba(61, 191, 154, 0.5);
        outline-offset: 2px;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(154, 149, 144, 0.2);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(154, 149, 144, 0.35);
      }

      /* ── Animations ── */
      @keyframes shimmer {
        0%   { background-position: 100% 0; }
        100% { background-position: -100% 0; }
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Skeleton loaders ── */
      .skeleton-line {
        height: 14px;
        border-radius: 4px;
        background: rgba(58, 58, 62, 0.5);
        background-image: linear-gradient(
          90deg,
          transparent 0%,
          rgba(228, 226, 222, 0.04) 40%,
          rgba(228, 226, 222, 0.06) 50%,
          rgba(228, 226, 222, 0.04) 60%,
          transparent 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.6s ease infinite;
      }

      .skeleton-line--short  { width: 60%; }
      .skeleton-line--medium { width: 80%; }

      .skeleton-block {
        height: 48px;
        border-radius: 8px;
        background: rgba(58, 58, 62, 0.35);
        background-image: linear-gradient(
          90deg,
          transparent 0%,
          rgba(228, 226, 222, 0.04) 40%,
          rgba(228, 226, 222, 0.06) 50%,
          rgba(228, 226, 222, 0.04) 60%,
          transparent 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.6s ease infinite;
      }

      .skeleton-row {
        height: 36px;
        border-radius: 6px;
        background: rgba(58, 58, 62, 0.3);
        background-image: linear-gradient(
          90deg,
          transparent 0%,
          rgba(228, 226, 222, 0.04) 40%,
          rgba(228, 226, 222, 0.06) 50%,
          rgba(228, 226, 222, 0.04) 60%,
          transparent 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.6s ease infinite;
      }

      /* ── Spinner ── */
      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(61, 191, 154, 0.2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
      }

      .spinner--small {
        width: 12px;
        height: 12px;
        border-width: 1.5px;
      }

      /* ── Fade-in utility ── */
      .fade-in {
        animation: fadeIn 180ms ease both;
      }

      /* ── Onboarding banner (hidden by default, shown via JS) ── */
      .onboarding {
        display: none;
        margin: 16px 20px;
        padding: 16px 20px;
        background: var(--miss-bg);
        border: 1px solid rgba(212, 148, 74, 0.25);
        border-radius: 10px;
        font-size: 13px;
        color: var(--warn);
      }

      .onboarding h3 { font-size: 14px; margin-bottom: 6px; }
      .onboarding p { line-height: 1.5; }

      .onboarding.visible { display: block; }

      /* ── Layout ── */
      .app {
        display: grid;
        grid-template-columns: 340px 1fr;
        grid-template-rows: 1fr;
        height: calc(100vh - 53px);
        overflow: hidden;
      }

      .app.logs-mode {
        grid-template-columns: 1fr;
      }

      .app.logs-mode .sidebar {
        display: none;
      }

      /* ── Sidebar (session list) ── */
      .sidebar {
        border-right: 1px solid var(--line);
        overflow-y: auto;
        scrollbar-gutter: stable;
        background: rgba(26, 26, 30, 0.5);
      }

      .sidebar-header {
        padding: 14px 16px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        position: sticky;
        top: 0;
        background: rgba(26, 26, 30, 0.92);
        backdrop-filter: blur(8px);
        z-index: 1;
        border-bottom: 1px solid var(--line);
      }

      .session-item {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.5);
        border-left: 3px solid transparent;
        cursor: pointer;
        transition: background 100ms, border-left-color 100ms;
      }

      .session-item:hover {
        background: rgba(61, 191, 154, 0.06);
        border-left-color: rgba(61, 191, 154, 0.3);
      }

      .session-item.selected {
        background: rgba(61, 191, 154, 0.12);
        border-left-color: var(--accent);
      }

      .session-item:active {
        background: rgba(61, 191, 154, 0.16);
      }

      .session-item-title {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
        margin-bottom: 5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .session-item-meta {
        display: flex;
        gap: 10px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--dim);
        align-items: center;
      }

      .session-item-preview {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
        margin-top: 4px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 4px;
        padding: 3px 8px;
        font-size: 11px;
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        line-height: 1;
        min-height: 22px;
      }

      .badge-source { background: var(--ok-bg); color: var(--accent); }
      .badge-source-claude { background: var(--source-claude-bg, rgba(204, 120, 50, 0.14)); color: var(--source-claude, #d4944a); }
      .badge-source-opencode { background: var(--source-opencode-bg, rgba(140, 100, 210, 0.14)); color: var(--source-opencode, #a88cd4); }
      .badge-source-codex { background: var(--source-codex-bg, rgba(61, 191, 154, 0.14)); color: var(--source-codex, #3dbf9a); }
      .badge-model { background: rgba(58, 58, 62, 0.5); color: var(--muted); }

      /* ── Detail pane ── */
      .detail {
        overflow-y: auto;
        scrollbar-gutter: stable;
        padding: 0;
      }

      .logs-view {
        padding: 24px 24px 48px;
      }

      .logs-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        padding-bottom: 20px;
        margin-bottom: 18px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.5);
      }

      .logs-subtitle {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
        max-width: 560px;
      }

      .logs-summary {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .log-summary-chip {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        border: 1px solid rgba(58, 58, 62, 0.7);
        border-radius: 999px;
        padding: 4px 12px;
        background: rgba(34, 34, 38, 0.7);
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .log-summary-chip.is-error {
        color: #d46a4a;
        border-color: rgba(212, 106, 74, 0.3);
        background: rgba(212, 106, 74, 0.12);
      }

      .log-summary-chip.is-warning {
        color: var(--warn);
        border-color: rgba(212, 148, 74, 0.3);
        background: rgba(212, 148, 74, 0.12);
      }

      .logs-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .logs-search-input {
        flex: 1;
        min-width: min(100%, 320px);
        max-width: 480px;
        padding: 8px 14px;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 13px;
        min-height: 36px;
      }

      .logs-search-input::placeholder {
        color: var(--dim);
      }

      .logs-search-input:focus {
        outline: 2px solid rgba(61, 191, 154, 0.2);
        border-color: rgba(61, 191, 154, 0.45);
      }

      .logs-filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .logs-list {
        display: grid;
        gap: 12px;
      }

      .log-card {
        border: 1px solid rgba(58, 58, 62, 0.7);
        background: rgba(34, 34, 38, 0.72);
        border-radius: 12px;
        overflow: hidden;
      }

      .log-card.is-error {
        border-color: rgba(212, 106, 74, 0.32);
        box-shadow: inset 0 1px 0 rgba(212, 106, 74, 0.08);
      }

      .log-card.is-warning {
        border-color: rgba(212, 148, 74, 0.32);
        box-shadow: inset 0 1px 0 rgba(212, 148, 74, 0.08);
      }

      .log-card summary {
        list-style: none;
        cursor: pointer;
        padding: 16px 20px;
        transition: background 80ms;
      }

      .log-card summary:hover {
        background: rgba(61, 191, 154, 0.04);
      }

      .log-card summary::-webkit-details-marker { display: none; }

      .log-card-topline {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .log-timestamp,
      .log-source-label,
      .log-card-subtitle,
      .log-metrics,
      .log-source-summary,
      .log-detail-row,
      .log-failure-head {
        font-family: var(--mono);
      }

      .log-timestamp,
      .log-source-label {
        color: var(--dim);
        font-size: 11px;
      }

      .badge-log-kind {
        background: rgba(58, 58, 62, 0.5);
        color: var(--ink);
      }

      .badge-status-completed {
        background: rgba(61, 191, 154, 0.14);
        color: var(--accent);
      }

      .badge-status-running,
      .badge-status-queued {
        background: rgba(212, 148, 74, 0.16);
        color: var(--warn);
      }

      .badge-status-warning {
        background: rgba(212, 148, 74, 0.12);
        color: var(--warn);
      }

      .badge-status-failed {
        background: rgba(212, 106, 74, 0.14);
        color: #d46a4a;
      }

      .log-card-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--ink);
        line-height: 1.45;
      }

      .log-card-subtitle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 11px;
      }

      .log-metrics {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--dim);
        flex-wrap: wrap;
      }

      .log-card-body {
        padding: 0 20px 20px;
        border-top: 1px solid rgba(58, 58, 62, 0.4);
      }

      .log-detail-section {
        margin-top: 14px;
      }

      .log-detail-title {
        margin-bottom: 8px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .log-detail-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        padding: 8px 0;
        border-top: 1px solid rgba(58, 58, 62, 0.3);
        font-size: 12px;
      }

      .log-detail-row:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .log-detail-key {
        color: var(--muted);
      }

      .log-detail-value {
        color: var(--ink);
        text-align: right;
        word-break: break-word;
      }

      .log-source-summary-list,
      .log-failure-list {
        display: grid;
        gap: 8px;
      }

      .log-source-summary {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(26, 26, 30, 0.6);
        color: var(--muted);
        font-size: 12px;
      }

      .log-failure-item {
        padding: 12px 14px;
        border-radius: 8px;
        border: 1px solid rgba(212, 106, 74, 0.2);
        background: rgba(212, 106, 74, 0.08);
      }

      .log-failure-head {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .log-failure-path {
        color: var(--ink);
        font-size: 11px;
        word-break: break-all;
      }

      .log-failure-copy {
        color: #e0b0a3;
        line-height: 1.5;
      }

      .log-raw {
        margin: 0;
        padding: 12px;
        border-radius: 8px;
        background: rgba(20, 20, 24, 0.95);
        border: 1px solid rgba(58, 58, 62, 0.45);
        color: var(--ink);
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.55;
        overflow-x: auto;
      }

      .db-sidebar-controls {
        display: grid;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.5);
      }

      .db-sidebar-copy,
      .db-sidebar-section-title,
      .db-query-copy,
      .db-query-hint,
      .db-schema-meta,
      .db-field-type,
      .db-field-note,
      .db-grid-head,
      .db-pagination,
      .db-null-pill {
        font-family: var(--mono);
      }

      .db-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--ink);
        font-size: 12px;
      }

      .db-toggle input {
        accent-color: var(--accent);
      }

      .db-sidebar-copy {
        color: var(--dim);
        font-size: 11px;
        line-height: 1.5;
        word-break: break-word;
      }

      .db-sidebar-section {
        padding-bottom: 12px;
      }

      .db-sidebar-section-title {
        padding: 12px 16px 6px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .db-sidebar-message {
        margin: 16px;
        padding: 12px 14px;
        border: 1px solid rgba(58, 58, 62, 0.6);
        border-radius: 10px;
        background: rgba(34, 34, 38, 0.76);
        color: var(--muted);
        line-height: 1.6;
      }

      .db-sidebar-message.is-error {
        border-color: rgba(212, 106, 74, 0.3);
        color: #e0b0a3;
        background: rgba(212, 106, 74, 0.08);
      }

      .db-table-item {
        width: 100%;
        text-align: left;
        background: transparent;
        color: inherit;
        border-right: 0;
        border-top: 0;
        border-bottom: 1px solid rgba(58, 58, 62, 0.5);
        border-left: 3px solid transparent;
        border-radius: 0;
      }

      .db-view {
        padding: 0 0 40px;
      }

      .db-path-label {
        white-space: normal !important;
        word-break: break-all;
        margin-left: auto;
        opacity: 0.6;
        font-size: 11px;
      }

      .db-view .detail-meta-secondary span + span:not(.badge):not(.db-path-label)::before {
        content: "\00b7";
        margin-right: 14px;
        color: var(--dim);
      }

      .db-subtabs {
        display: flex;
        gap: 8px;
        padding: 16px 24px 10px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.45);
        background: rgba(30, 30, 34, 0.5);
      }

      .db-schema-section {
        padding: 18px 24px 18px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.35);
      }

      .db-panel {
        padding: 18px 24px 24px;
      }

      .db-section-title {
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-family: var(--mono);
        margin-bottom: 12px;
      }

      .db-section-title--prominent {
        font-size: 12px;
        color: var(--ink);
        margin-bottom: 12px;
        padding-left: 10px;
        border-left: 2px solid var(--accent);
      }

      .db-schema-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .db-schema-chip {
        min-width: min(140px, 100%);
        flex: 1 1 140px;
        padding: 10px 12px;
        border: 1px solid rgba(58, 58, 62, 0.65);
        border-radius: 10px;
        background: rgba(34, 34, 38, 0.72);
        transition: border-color 100ms;
      }

      .db-schema-chip:hover {
        border-color: rgba(61, 191, 154, 0.25);
      }

      .db-schema-chip.is-hidden {
        border-color: rgba(154, 149, 144, 0.2);
        background: rgba(34, 34, 38, 0.45);
      }

      .db-schema-title {
        color: var(--ink);
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .db-schema-meta {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        color: var(--dim);
        font-size: 11px;
        padding-top: 6px;
        border-top: 1px solid rgba(58, 58, 62, 0.35);
      }

      .badge-db-table,
      .badge-db-core,
      .badge-db-meta {
        background: rgba(58, 58, 62, 0.5);
        color: var(--ink);
      }

      .badge-db-virtual {
        background: rgba(61, 191, 154, 0.14);
        color: var(--accent);
      }

      .badge-db-advanced,
      .badge-db-hidden {
        background: rgba(212, 148, 74, 0.14);
        color: var(--warn);
      }

      .db-schema-empty {
        padding: 14px 16px;
        border: 1px dashed rgba(58, 58, 62, 0.65);
        border-radius: 10px;
        color: var(--dim);
        background: rgba(26, 26, 30, 0.45);
      }

      .db-filter-empty {
        padding: 10px 14px;
        border: 1px dashed rgba(58, 58, 62, 0.45);
        border-radius: 8px;
        color: var(--dim);
        background: transparent;
        font-size: 12px;
        margin-bottom: 8px;
      }

      .db-toolbar-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, auto);
        gap: 16px;
        margin-bottom: 18px;
        align-items: start;
      }

      .db-sort-divider {
        border-top: 1px solid rgba(58, 58, 62, 0.45);
        margin: 10px 0 8px;
      }

      .db-toolbar-group {
        padding: 14px 16px;
        border: 1px solid rgba(58, 58, 62, 0.65);
        border-radius: 12px;
        background: rgba(34, 34, 38, 0.62);
      }

      .db-filter-row {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) minmax(120px, 1fr) minmax(120px, 1fr) auto;
        gap: 8px;
        margin-bottom: 8px;
      }

      .db-filter-actions,
      .db-sort-row,
      .db-query-actions,
      .db-pagination {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .db-pagination {
        padding-top: 14px;
        padding-bottom: 8px;
        margin-top: 2px;
        border-top: 1px solid rgba(58, 58, 62, 0.3);
        justify-content: center;
      }

      .db-pagination .btn-ghost {
        border: 1px solid var(--card-border);
        background: var(--card);
        color: var(--ink);
      }

      .db-pagination .btn-ghost:hover {
        border-color: rgba(61, 191, 154, 0.3);
        background: rgba(61, 191, 154, 0.08);
      }

      .db-pagination .btn-ghost:disabled {
        opacity: 0.4;
        cursor: default;
      }

      .db-select,
      .db-input,
      .db-query-editor {
        border: 1px solid rgba(58, 58, 62, 0.8);
        border-radius: 8px;
        background: rgba(20, 20, 24, 0.9);
        color: var(--ink);
        font: inherit;
      }

      .db-select,
      .db-input {
        min-height: 36px;
        padding: 8px 12px;
      }

      .db-query-editor {
        width: 100%;
        min-height: 180px;
        padding: 14px 16px;
        resize: vertical;
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.6;
      }

      .db-select:focus,
      .db-input:focus,
      .db-query-editor:focus {
        outline: 2px solid rgba(61, 191, 154, 0.22);
        border-color: rgba(61, 191, 154, 0.4);
      }

      .db-null-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 12px;
        border-radius: 8px;
        border: 1px dashed rgba(58, 58, 62, 0.5);
        background: rgba(58, 58, 62, 0.3);
        color: var(--dim);
        font-size: 11px;
        cursor: default;
        user-select: none;
      }

      .db-icon-button {
        min-width: 36px;
        min-height: 36px;
        padding: 0;
        justify-content: center;
      }

      .db-grid-shell {
        display: grid;
        gap: 16px;
      }

      .db-grid-wrap {
        overflow: auto;
        border: 1px solid rgba(58, 58, 62, 0.65);
        border-radius: 12px;
        background: rgba(20, 20, 24, 0.86);
      }

      .db-grid {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      .db-grid th,
      .db-grid td {
        padding: 12px 14px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.45);
        text-align: left;
        vertical-align: top;
      }

      .db-grid th {
        position: sticky;
        top: 0;
        padding: 14px 14px;
        background: rgba(26, 26, 30, 0.96);
        z-index: 1;
      }

      .db-grid thead tr {
        border-bottom: 2px solid rgba(58, 58, 62, 0.6);
      }

      .db-grid-head {
        display: grid;
        gap: 5px;
        color: var(--dim);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .db-grid-head span:first-child {
        color: var(--ink);
        font-size: 11px;
      }

      .db-grid tbody tr {
        cursor: pointer;
        transition: background 90ms;
      }

      .db-grid tbody tr:hover {
        background: rgba(61, 191, 154, 0.05);
      }

      .db-grid tbody tr.selected {
        background: rgba(61, 191, 154, 0.12);
      }

      .db-grid td {
        max-width: 280px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
        word-break: break-word;
      }

      .db-grid td.db-cell-number {
        color: var(--ink);
        font-family: var(--mono);
        font-variant-numeric: tabular-nums;
      }

      .db-grid td.db-cell-null {
        color: var(--dim);
        font-family: var(--mono);
        font-style: italic;
      }

      .db-grid td.db-cell-blob {
        color: var(--warn);
        font-family: var(--mono);
        background: rgba(212, 148, 74, 0.04);
      }

      .db-row-inspector,
      .db-query-shell {
        border: 1px solid rgba(58, 58, 62, 0.65);
        border-radius: 12px;
        background: rgba(34, 34, 38, 0.62);
      }

      .db-row-inspector {
        padding: 18px 20px;
      }

      .db-query-shell {
        padding: 16px 18px;
        margin-bottom: 20px;
      }

      .db-field-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 14px;
      }

      .db-field {
        padding: 12px 14px;
        border: 1px solid rgba(58, 58, 62, 0.5);
        border-radius: 10px;
        background: rgba(20, 20, 24, 0.72);
      }

      .db-field-header,
      .db-query-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .db-field-name {
        color: var(--ink);
        font-size: 12px;
        font-weight: 600;
      }

      .db-field-type,
      .db-field-note,
      .db-query-copy,
      .db-query-hint,
      .db-pagination {
        color: var(--dim);
        font-size: 11px;
      }

      .db-query-actions {
        margin-top: 12px;
      }

      .db-field-value {
        margin: 0;
        padding-top: 8px;
        border-top: 1px solid rgba(58, 58, 62, 0.3);
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--ink);
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.55;
      }

      .db-inline-notice {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(212, 148, 74, 0.3);
        background: rgba(212, 148, 74, 0.1);
        color: var(--warn);
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.5;
      }

      .db-empty-code {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(61, 191, 154, 0.18);
        background: rgba(61, 191, 154, 0.08);
        color: var(--accent);
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.5;
      }

      .detail-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--dim);
        font-size: 14px;
      }

      .empty-state {
        max-width: 320px;
        text-align: center;
      }

      .empty-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 10px;
      }

      .empty-copy {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
      }

      .detail-toolbar {
        display: flex;
        align-items: center;
        gap: 8px 16px;
        padding: 14px 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(30, 30, 34, 0.88);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 1;
        flex-wrap: wrap;
      }

      .detail-title {
        font-size: 15px;
        font-weight: 700;
        margin-right: auto;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 50%;
      }

      .detail-meta-secondary {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
      }

      .detail-meta-secondary span { white-space: nowrap; }

      /* Labels & tags */
      .curation-bar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(30, 30, 34, 0.5);
      }

      .curation-group {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .curation-group-label {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 600;
        min-width: 56px;
        flex-shrink: 0;
      }

      .chip {
        border: 1px solid var(--card-border);
        border-radius: 6px;
        padding: 6px 14px;
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        font-family: var(--mono);
        min-height: 32px;
        display: inline-flex;
        align-items: center;
        transition: border-color 100ms, background 100ms;
      }

      .chip:hover { border-color: rgba(61, 191, 154, 0.3); }
      .chip.active { background: var(--ok-bg); color: var(--accent); border-color: rgba(61, 191, 154, 0.26); }

      .detail-context {
        padding: 16px 24px 8px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.5);
        background: rgba(30, 30, 34, 0.36);
      }

      .detail-context-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }

      .detail-context-row {
        min-width: 0;
        padding: 10px 12px;
        border: 1px solid rgba(58, 58, 62, 0.65);
        border-radius: 8px;
        background: rgba(34, 34, 38, 0.65);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .detail-context-row--full {
        grid-column: 1 / -1;
      }

      .detail-context-label {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 600;
      }

      .detail-context-value,
      .detail-context-json {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink);
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .detail-context-copy {
        font-size: 13px;
        color: var(--ink);
        line-height: 1.65;
        white-space: pre-wrap;
      }

      .detail-context-json {
        margin: 0;
        overflow: auto;
        max-height: 240px;
      }

      .tag-input {
        border: 1px solid var(--card-border);
        border-radius: 999px;
        padding: 6px 14px;
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 12px;
        width: 140px;
        min-height: 32px;
        font-family: var(--mono);
      }

      .tag-input::placeholder {
        color: var(--dim);
      }

      .tag-input:focus {
        outline: 2px solid rgba(61, 191, 154, 0.2);
        border-color: rgba(61, 191, 154, 0.45);
      }

      /* Messages */
      .message-list {
        padding: 20px 24px 48px;
        display: grid;
        gap: 10px;
      }

      .section-title {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }

      .artifact-list {
        padding: 14px 20px 4px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.5);
      }

      .artifact-card {
        border: 1px solid rgba(58, 58, 62, 0.65);
        background: rgba(34, 34, 38, 0.65);
        border-radius: 8px;
        margin-bottom: 10px;
        overflow: hidden;
      }

      .artifact-card summary {
        list-style: none;
        cursor: pointer;
        padding: 10px 12px;
      }

      .artifact-card summary::-webkit-details-marker { display: none; }

      .artifact-title {
        font-weight: 600;
        margin-bottom: 5px;
      }

      .artifact-meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--dim);
        margin-bottom: 6px;
      }

      .artifact-preview {
        color: var(--muted);
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .artifact-payload {
        margin: 0;
        padding: 12px;
        border-top: 1px solid rgba(58, 58, 62, 0.5);
        background: rgba(26, 26, 30, 0.65);
        color: var(--ink);
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.5;
        overflow-x: auto;
      }

      .settings-overlay {
        position: fixed;
        inset: 0;
        background: rgba(16, 16, 20, 0.56);
        backdrop-filter: blur(8px);
        z-index: 90;
        display: none;
        align-items: stretch;
        justify-content: flex-end;
      }

      .settings-overlay.visible {
        display: flex;
      }

      .settings-panel {
        width: min(460px, 100vw);
        height: 100vh;
        background: linear-gradient(180deg, rgba(34, 34, 38, 0.98) 0%, rgba(26, 26, 30, 0.98) 100%);
        border-left: 1px solid rgba(58, 58, 62, 0.8);
        padding: 22px 20px 28px;
        overflow-y: auto;
        box-shadow: -24px 0 60px rgba(0, 0, 0, 0.32);
      }

      .settings-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }

      .settings-subtitle {
        color: var(--muted);
        line-height: 1.5;
      }

      .settings-section {
        border: 1px solid rgba(58, 58, 62, 0.65);
        border-radius: 10px;
        background: rgba(34, 34, 38, 0.7);
        padding: 16px;
        margin-bottom: 14px;
      }

      .settings-section-title {
        color: var(--ink);
        font-weight: 600;
        margin-bottom: 10px;
      }

      .settings-code {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--ink);
        background: rgba(26, 26, 30, 0.7);
        border: 1px solid rgba(58, 58, 62, 0.5);
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 10px;
        word-break: break-all;
      }

      .settings-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 0;
        border-top: 1px solid rgba(58, 58, 62, 0.35);
      }

      .settings-row:first-of-type {
        border-top: 0;
        padding-top: 0;
      }

      .settings-note {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        text-align: right;
        word-break: break-word;
      }

      .settings-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chip-static {
        cursor: default;
      }

      .color-picker-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
        border-top: 1px solid rgba(58, 58, 62, 0.35);
      }

      .color-picker-row:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .color-picker-label {
        flex: 1;
      }

      .color-picker-swatch {
        -webkit-appearance: none;
        appearance: none;
        width: 32px;
        height: 32px;
        border: 2px solid var(--card-border);
        border-radius: 8px;
        background: none;
        cursor: pointer;
        padding: 0;
      }

      .color-picker-swatch::-webkit-color-swatch-wrapper {
        padding: 0;
      }

      .color-picker-swatch::-webkit-color-swatch {
        border: none;
        border-radius: 5px;
      }

      .color-picker-swatch:hover {
        border-color: rgba(61, 191, 154, 0.5);
      }

      .color-picker-preview {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .color-reset-btn {
        border: 1px solid var(--card-border);
        border-radius: 6px;
        padding: 4px 10px;
        background: var(--card);
        color: var(--muted);
        font: inherit;
        font-size: 11px;
        cursor: pointer;
        font-family: var(--mono);
      }

      .color-reset-btn:hover {
        border-color: rgba(61, 191, 154, 0.3);
        color: var(--ink);
      }

      .msg {
        padding: 12px 16px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 6px;
      }

      .msg-user {
        background: rgba(61, 191, 154, 0.08);
        border-left: 3px solid var(--accent);
      }

      .msg-assistant {
        background: rgba(212, 148, 74, 0.08);
        border-left: 3px solid var(--warn);
      }

      .msg-system, .msg-tool {
        background: rgba(58, 58, 62, 0.3);
        border-left: 3px solid var(--dim);
        font-size: 12px;
        color: var(--muted);
      }

      .msg-meta {
        background: rgba(58, 58, 62, 0.22);
        border-left-color: rgba(154, 149, 144, 0.7);
        color: var(--ink);
      }

      .msg-header {
        display: flex;
        gap: 10px;
        align-items: center;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--dim);
        margin-bottom: 8px;
        text-transform: uppercase;
      }

      .msg-header .role { font-weight: 700; }

      .msg-header .kind {
        border: 1px solid rgba(58, 58, 62, 0.75);
        border-radius: 999px;
        padding: 1px 6px;
        color: var(--muted);
      }

      /* ── Sources footer (collapsed) ── */
      .sources-toggle {
        padding: 12px 16px;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        cursor: pointer;
        border-top: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 6px;
        user-select: none;
      }

      .sources-toggle:hover { color: var(--ink); }
      .sources-toggle .arrow { transition: transform 150ms; }
      .sources-toggle.open .arrow { transform: rotate(90deg); }

      .sources-panel {
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        padding-top: 0;
        padding-bottom: 0;
        padding-left: 14px;
        padding-right: 14px;
        border-top: 1px solid rgba(58, 58, 62, 0.5);
        transition: max-height 200ms ease, opacity 200ms ease, padding 200ms ease;
      }

      .sources-panel.visible {
        max-height: 400px;
        opacity: 1;
        padding: 8px 14px 14px;
      }

      .source-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        font-size: 12px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.4);
      }

      .source-row:last-child { border-bottom: 0; }

      .source-name { font-weight: 600; min-width: 100px; }

      .source-path {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        word-break: break-all;
        flex: 1;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .status-dot.ok { background: var(--accent); }
      .status-dot.warn { background: var(--warn); }
      .status-dot.miss { background: #d46a4a; }

      .pill {
        border-radius: 4px;
        padding: 2px 8px;
        font-size: 11px;
        font-family: var(--mono);
        text-transform: uppercase;
      }

      .pill-ok { background: var(--ok-bg); color: var(--accent); }
      .pill-miss { background: var(--miss-bg); color: #d46a4a; }
      .pill-warn { background: rgba(212, 148, 74, 0.2); color: var(--warn); }

      .source-checks {
        margin: 4px 0 0 18px;
        font-size: 12px;
        font-family: var(--mono);
        color: var(--muted);
      }

      .source-checks div {
        padding: 2px 0;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      /* Export status toast */
      .export-status {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: var(--panel);
        color: var(--ink);
        border: 1px solid var(--line);
        padding: 8px 14px;
        border-radius: 8px;
        font-family: var(--mono);
        font-size: 13px;
        z-index: 100;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 200ms, transform 200ms;
        pointer-events: none;
      }

      .export-status.visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 768px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: 45% 55%;
        }

        .topbar-stats { display: none; }
        .topbar-search {
          max-width: none;
        }
        .db-toolbar-row {
          grid-template-columns: 1fr;
        }
        .db-filter-row {
          grid-template-columns: 1fr;
        }
        .logs-header,
        .logs-controls,
        .log-card-subtitle,
        .log-detail-row,
        .db-query-header,
        .db-query-actions,
        .db-pagination {
          flex-direction: column;
          align-items: flex-start;
        }
        .logs-summary {
          justify-content: flex-start;
        }
        .log-detail-value {
          text-align: left;
        }
        .db-grid {
          min-width: 560px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="topbar-brand">Distill</span>
      <div class="topbar-view-switch">
        <button class="view-tab active" type="button" data-view-target="sessions">Sessions</button>
        <button class="view-tab" type="button" data-view-target="db">DB</button>
        <button class="view-tab" type="button" data-view-target="logs">Logs</button>
      </div>
      <input
        type="search"
        class="topbar-search"
        placeholder="Search sessions…"
        data-search-input
      />
      <div class="topbar-stats" data-stats></div>
      <div class="topbar-actions">
        <div class="topbar-sync-group">
          <span class="topbar-sync" data-sync-status data-state="idle">idle</span>
          <button class="btn-ghost" data-sync-now title="Re-sync all sources now">&#x27F3; Sync</button>
        </div>
        <button class="btn-ghost" data-settings-open title="App settings">&#x2699; Settings</button>
      </div>
    </header>

    <div class="onboarding" data-onboarding>
      <h3>No sessions found</h3>
      <p>
        Distill reads conversations from <strong>Codex CLI</strong> and <strong>Claude Code</strong>.
        The desktop app syncs local history on launch and in the background.
      </p>
    </div>

    <div class="app" data-app-shell>
      <aside class="sidebar">
        <div class="sidebar-header">
          <span data-session-count>Sessions</span>
          <span data-scanned-at></span>
        </div>
        <div data-sessions></div>
        <div class="sources-toggle" data-sources-toggle>
          <span class="arrow">▸</span> Sources
          <button class="help-tip" type="button" data-help-tip="The Sources panel shows whether Distill can see your Codex and Claude local histories and which folders it is reading from." data-help-title="Sources">?</button>
        </div>
        <div class="sources-panel" data-sources></div>
      </aside>

      <main class="detail" data-session-detail>
        <div class="detail-empty">Select a session</div>
      </main>
    </div>

    <div class="export-status" data-export-status></div>
    <div class="tooltip-float" data-tooltip-float></div>
    <div class="help-popover" data-help-popover></div>
    <div data-settings-root></div>

    <script>
      var exports = {};
      var module = { exports };
    </script>
    <script src="../dist/renderer/app.js"></script>
  </body>
</html>
