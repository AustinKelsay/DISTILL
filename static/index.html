<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distill</title>
    <style>
      :root {
        --bg: #1a1a1e;
        --panel: #222226;
        --ink: #e4e2de;
        --muted: #9a9590;
        --dim: #6a6560;
        --line: #3a3a3e;
        --accent: #3dbf9a;
        --warn: #d4944a;
        --ok-bg: #1a332b;
        --miss-bg: #332418;
        --card: rgba(34, 34, 38, 0.85);
        --card-border: rgba(58, 58, 62, 0.9);
        --mono: "Menlo", "Monaco", "Consolas", monospace;
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
        font-size: 13px;
        color: var(--ink);
        background: linear-gradient(180deg, #1e1e22 0%, var(--bg) 100%);
      }

      /* ── Top bar ── */
      .topbar {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(30, 30, 34, 0.92);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .topbar-brand {
        font-weight: 700;
        font-size: 15px;
        color: var(--accent);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-family: var(--mono);
      }

      .topbar-search {
        flex: 1;
        max-width: 420px;
        padding: 7px 12px;
        border-radius: 8px;
        border: 1px solid var(--card-border);
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 13px;
      }

      .topbar-search:focus {
        outline: 2px solid rgba(61, 191, 154, 0.25);
        border-color: rgba(61, 191, 154, 0.45);
      }

      .topbar-stats {
        display: flex;
        gap: 16px;
        margin-left: auto;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }

      .topbar-stats .stat-value {
        color: var(--ink);
        font-weight: 600;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .topbar-sync {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        border: 1px solid var(--card-border);
        border-radius: 999px;
        padding: 4px 8px;
        background: var(--card);
      }

      .topbar-sync[data-state="running"] {
        color: var(--warn);
        border-color: rgba(212, 148, 74, 0.35);
      }

      .topbar-sync[data-state="completed"] {
        color: var(--accent);
        border-color: rgba(61, 191, 154, 0.35);
      }

      .topbar-sync[data-state="failed"] {
        color: #d46a4a;
        border-color: rgba(212, 106, 74, 0.35);
      }

      .btn {
        border: 1px solid var(--card-border);
        border-radius: 6px;
        padding: 5px 10px;
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        font-family: var(--mono);
        white-space: nowrap;
      }

      .btn:hover { border-color: rgba(61, 191, 154, 0.3); }
      .btn:active { background: var(--ok-bg); }

      .help-tip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 1px solid rgba(61, 191, 154, 0.26);
        background: rgba(61, 191, 154, 0.08);
        color: var(--accent);
        font-family: var(--mono);
        font-size: 10px;
        line-height: 1;
        cursor: pointer;
        vertical-align: middle;
        margin-left: 4px;
      }

      .help-tip:hover {
        background: rgba(61, 191, 154, 0.14);
        border-color: rgba(61, 191, 154, 0.45);
      }

      [data-tooltip] {
        position: relative;
      }

      [data-tooltip]:hover::after {
        content: attr(data-tooltip);
        position: absolute;
        left: 50%;
        bottom: calc(100% + 8px);
        transform: translateX(-50%);
        max-width: 280px;
        min-width: 120px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(18, 18, 22, 0.96);
        border: 1px solid rgba(61, 191, 154, 0.26);
        color: var(--ink);
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.45;
        white-space: normal;
        text-transform: none;
        letter-spacing: normal;
        pointer-events: none;
        z-index: 200;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      }

      /* ── Onboarding banner (hidden by default, shown via JS) ── */
      .onboarding {
        display: none;
        margin: 16px 20px;
        padding: 16px 20px;
        background: var(--miss-bg);
        border: 1px solid rgba(212, 148, 74, 0.25);
        border-radius: 10px;
        font-size: 13px;
        color: var(--warn);
      }

      .onboarding h3 { font-size: 14px; margin-bottom: 6px; }
      .onboarding p { line-height: 1.5; }

      .onboarding.visible { display: block; }

      /* ── Layout ── */
      .app {
        display: grid;
        grid-template-columns: 340px 1fr;
        grid-template-rows: 1fr;
        height: calc(100vh - 49px);
        overflow: hidden;
      }

      /* ── Sidebar (session list) ── */
      .sidebar {
        border-right: 1px solid var(--line);
        overflow-y: auto;
        background: rgba(26, 26, 30, 0.5);
      }

      .sidebar-header {
        padding: 12px 14px 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        position: sticky;
        top: 0;
        background: rgba(26, 26, 30, 0.92);
        backdrop-filter: blur(8px);
        z-index: 1;
        border-bottom: 1px solid var(--line);
      }

      .session-item {
        padding: 10px 14px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.5);
        cursor: pointer;
        transition: background 80ms;
      }

      .session-item:hover { background: rgba(61, 191, 154, 0.08); }
      .session-item.selected { background: rgba(61, 191, 154, 0.14); border-left: 3px solid var(--accent); }

      .session-item-title {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .session-item-meta {
        display: flex;
        gap: 8px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--dim);
        align-items: center;
      }

      .session-item-preview {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
        margin-top: 4px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .badge {
        display: inline-block;
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 10px;
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .badge-source { background: var(--ok-bg); color: var(--accent); }
      .badge-model { background: rgba(58, 58, 62, 0.5); color: var(--muted); }

      /* ── Detail pane ── */
      .detail {
        overflow-y: auto;
        padding: 0;
      }

      .detail-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--dim);
        font-size: 14px;
      }

      .empty-state {
        max-width: 320px;
        text-align: center;
      }

      .empty-title {
        font-size: 18px;
        color: var(--ink);
        margin-bottom: 8px;
      }

      .empty-copy {
        color: var(--muted);
        line-height: 1.6;
      }

      .detail-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 20px;
        border-bottom: 1px solid var(--line);
        background: rgba(30, 30, 34, 0.88);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 1;
        flex-wrap: wrap;
      }

      .detail-title {
        font-size: 15px;
        font-weight: 700;
        margin-right: auto;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 40%;
      }

      .detail-meta-inline {
        display: flex;
        gap: 14px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }

      .detail-meta-inline span { white-space: nowrap; }

      /* Labels & tags */
      .curation-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 20px;
        border-bottom: 1px solid var(--line);
        flex-wrap: wrap;
        background: rgba(30, 30, 34, 0.5);
      }

      .curation-bar .sep {
        width: 1px;
        height: 16px;
        background: var(--line);
        margin: 0 4px;
      }

      .chip {
        border: 1px solid var(--card-border);
        border-radius: 4px;
        padding: 3px 8px;
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 11px;
        cursor: pointer;
        font-family: var(--mono);
      }

      .chip:hover { border-color: rgba(61, 191, 154, 0.3); }
      .chip.active { background: var(--ok-bg); color: var(--accent); border-color: rgba(61, 191, 154, 0.26); }

      .tag-input {
        border: 1px solid var(--card-border);
        border-radius: 4px;
        padding: 3px 8px;
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 11px;
        width: 100px;
        font-family: var(--mono);
      }

      .tag-input:focus {
        outline: 2px solid rgba(61, 191, 154, 0.2);
        border-color: rgba(61, 191, 154, 0.45);
      }

      /* Messages */
      .message-list {
        padding: 12px 20px 40px;
        display: grid;
        gap: 2px;
      }

      .section-title {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 10px;
      }

      .artifact-list {
        padding: 14px 20px 4px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.5);
      }

      .artifact-card {
        border: 1px solid rgba(58, 58, 62, 0.65);
        background: rgba(34, 34, 38, 0.65);
        border-radius: 8px;
        margin-bottom: 10px;
        overflow: hidden;
      }

      .artifact-card summary {
        list-style: none;
        cursor: pointer;
        padding: 10px 12px;
      }

      .artifact-card summary::-webkit-details-marker { display: none; }

      .artifact-title {
        font-weight: 600;
        margin-bottom: 5px;
      }

      .artifact-meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--dim);
        margin-bottom: 6px;
      }

      .artifact-preview {
        color: var(--muted);
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .artifact-payload {
        margin: 0;
        padding: 12px;
        border-top: 1px solid rgba(58, 58, 62, 0.5);
        background: rgba(26, 26, 30, 0.65);
        color: var(--ink);
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.5;
        overflow-x: auto;
      }

      .settings-overlay {
        position: fixed;
        inset: 0;
        background: rgba(16, 16, 20, 0.56);
        backdrop-filter: blur(8px);
        z-index: 90;
        display: none;
        align-items: stretch;
        justify-content: flex-end;
      }

      .settings-overlay.visible {
        display: flex;
      }

      .settings-panel {
        width: min(460px, 100vw);
        height: 100vh;
        background: linear-gradient(180deg, rgba(34, 34, 38, 0.98) 0%, rgba(26, 26, 30, 0.98) 100%);
        border-left: 1px solid rgba(58, 58, 62, 0.8);
        padding: 22px 20px 28px;
        overflow-y: auto;
        box-shadow: -24px 0 60px rgba(0, 0, 0, 0.32);
      }

      .settings-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }

      .settings-subtitle {
        color: var(--muted);
        line-height: 1.5;
      }

      .settings-section {
        border: 1px solid rgba(58, 58, 62, 0.65);
        border-radius: 10px;
        background: rgba(34, 34, 38, 0.7);
        padding: 14px;
        margin-bottom: 12px;
      }

      .settings-section-title {
        color: var(--ink);
        font-weight: 600;
        margin-bottom: 10px;
      }

      .settings-code {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--ink);
        background: rgba(26, 26, 30, 0.7);
        border: 1px solid rgba(58, 58, 62, 0.5);
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 10px;
        word-break: break-all;
      }

      .settings-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 6px 0;
        border-top: 1px solid rgba(58, 58, 62, 0.35);
      }

      .settings-row:first-of-type {
        border-top: 0;
        padding-top: 0;
      }

      .settings-note {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
        text-align: right;
        word-break: break-word;
      }

      .settings-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chip-static {
        cursor: default;
      }

      .msg {
        padding: 10px 14px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 6px;
      }

      .msg-user {
        background: rgba(61, 191, 154, 0.08);
        border-left: 3px solid var(--accent);
      }

      .msg-assistant {
        background: rgba(212, 148, 74, 0.08);
        border-left: 3px solid var(--warn);
      }

      .msg-system, .msg-tool {
        background: rgba(58, 58, 62, 0.3);
        border-left: 3px solid var(--dim);
        font-size: 12px;
        color: var(--muted);
      }

      .msg-header {
        display: flex;
        gap: 10px;
        align-items: center;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--dim);
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .msg-header .role { font-weight: 700; }

      /* ── Sources footer (collapsed) ── */
      .sources-toggle {
        padding: 8px 14px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        cursor: pointer;
        border-top: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 6px;
        user-select: none;
      }

      .sources-toggle:hover { color: var(--ink); }
      .sources-toggle .arrow { transition: transform 150ms; }
      .sources-toggle.open .arrow { transform: rotate(90deg); }

      .sources-panel {
        display: none;
        padding: 8px 14px 14px;
        border-top: 1px solid rgba(58, 58, 62, 0.5);
      }

      .sources-panel.visible { display: block; }

      .source-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 0;
        font-size: 12px;
        border-bottom: 1px solid rgba(58, 58, 62, 0.4);
      }

      .source-row:last-child { border-bottom: 0; }

      .source-name { font-weight: 600; min-width: 100px; }

      .source-path {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        word-break: break-all;
        flex: 1;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .status-dot.ok { background: var(--accent); }
      .status-dot.warn { background: var(--warn); }
      .status-dot.miss { background: #d46a4a; }

      .pill {
        border-radius: 4px;
        padding: 1px 6px;
        font-size: 10px;
        font-family: var(--mono);
        text-transform: uppercase;
      }

      .pill-ok { background: var(--ok-bg); color: var(--accent); }
      .pill-miss { background: var(--miss-bg); color: #d46a4a; }
      .pill-warn { background: rgba(212, 148, 74, 0.2); color: var(--warn); }

      .source-checks {
        margin: 4px 0 0 18px;
        font-size: 11px;
        font-family: var(--mono);
        color: var(--muted);
      }

      .source-checks div {
        padding: 2px 0;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      /* Export status toast */
      .export-status {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: var(--panel);
        color: var(--ink);
        border: 1px solid var(--line);
        padding: 8px 14px;
        border-radius: 8px;
        font-family: var(--mono);
        font-size: 12px;
        z-index: 100;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 200ms, transform 200ms;
        pointer-events: none;
      }

      .export-status.visible {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 768px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: 45% 55%;
        }

        .topbar-stats { display: none; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="topbar-brand">Distill</span>
      <input
        type="search"
        class="topbar-search"
        placeholder="Search sessions…"
        data-search-input
        title="Search imported session titles and transcript text."
        data-tooltip="Search imported session titles and transcript text."
      />
      <button class="help-tip" type="button" data-help-tip="Search across imported session titles and transcript text. Clear the search box to return to your recent sessions.">?</button>
      <div class="topbar-stats" data-stats></div>
      <div class="topbar-actions">
        <span class="topbar-sync" data-sync-status data-state="idle" title="Background import status." data-tooltip="Background import status. Distill syncs on launch and periodically while the app is open.">idle</span>
        <button class="btn" data-settings-open title="Open the current app settings snapshot." data-tooltip="Open the current app settings snapshot.">settings</button>
        <button class="btn" data-sync-now title="Run a sync now." data-tooltip="Run a sync now and refresh local sessions from Codex and Claude histories.">↻ sync</button>
        <button class="btn" data-export-label="train" title="Export sessions labeled train." data-tooltip="Export sessions labeled train to JSONL for dataset preparation.">↑ train</button>
        <button class="btn" data-export-label="holdout" title="Export sessions labeled holdout." data-tooltip="Export sessions labeled holdout to JSONL for evaluation or validation splits.">↑ holdout</button>
        <button class="btn" data-export-label="favorite" title="Export sessions labeled favorite." data-tooltip="Export sessions labeled favorite to JSONL for a hand-picked set.">↑ fav</button>
        <button class="help-tip" type="button" data-help-tip="Top-bar actions let you sync local data, inspect settings, and export sessions by label." title="Explain the top bar actions." data-tooltip="Explain the top bar actions.">?</button>
      </div>
    </header>

    <div class="onboarding" data-onboarding>
      <h3>No sessions found</h3>
      <p>
        Distill reads conversations from <strong>Codex CLI</strong> and <strong>Claude Code</strong>.
        The desktop app syncs local history on launch and in the background.
      </p>
    </div>

    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <span data-session-count>Sessions</span>
          <button class="help-tip" type="button" data-help-tip="The left column shows your most recent imported sessions. Click one to inspect its transcript and metadata.">?</button>
          <span data-scanned-at></span>
        </div>
        <div data-sessions></div>
        <div class="sources-toggle" data-sources-toggle title="Show or hide detected local source health." data-tooltip="Show or hide detected local source health and data root checks.">
          <span class="arrow">▸</span> Sources
          <button class="help-tip" type="button" data-help-tip="The Sources panel shows whether Distill can see your Codex and Claude local histories and which folders it is reading from.">?</button>
        </div>
        <div class="sources-panel" data-sources></div>
      </aside>

      <main class="detail" data-session-detail>
        <div class="detail-empty">Select a session</div>
      </main>
    </div>

    <div class="export-status" data-export-status></div>
    <div data-settings-root></div>

    <script>
      var exports = {};
      var module = { exports };
    </script>
    <script src="../dist/renderer/app.js"></script>
  </body>
</html>
